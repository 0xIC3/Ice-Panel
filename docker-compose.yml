services:
  postgres:
    image: postgres:16-alpine
    container_name: icepanel-postgres
    environment:
      POSTGRES_USER: icepanel
      POSTGRES_PASSWORD: icepanel_dev
      POSTGRES_DB: icepanel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
