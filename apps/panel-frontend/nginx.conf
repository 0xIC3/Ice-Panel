# nginx config for the panel-frontend container.
#
# Two responsibilities:
#   1. Serve the Vite-built SPA with client-side-routing fallback.
#   2. Reverse-proxy `/api`, `/sub`, `/health` to the backend service so the
#      browser sees a single origin (no CORS).
#
# The upstream `backend` resolves via Docker Compose's service DNS — that
# means this image is opinionated for our compose topology. If you front
# the panel with Traefik/Caddy/your-own-nginx, mount your own conf over
# this file or override via a volume.

upstream panel_backend {
    server backend:3000;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ───── API proxy ─────
    location /api/ {
        proxy_pass http://panel_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /sub/ {
        proxy_pass http://panel_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        proxy_pass http://panel_backend;
    }

    # ───── Static assets ─────
    # Vite emits content-hashed filenames, so we can cache them aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # index.html is the cache-bust point — never cache it.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback: client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
