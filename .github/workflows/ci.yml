name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same ref. Saves
# minutes on rapid push-fix-push cycles and removes confusing red marks
# on superseded SHAs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  panel:
    name: panel (backend + frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Real Postgres + Redis. The backend's vitest suite mostly mocks Prisma
    # but `subscription.routes.test.ts` and a handful of others import the
    # real client, which fails fast without a reachable DATABASE_URL. Same
    # logic for BullMQ which mounts on Redis at import time.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ice
          POSTGRES_PASSWORD: ice
          POSTGRES_DB: ice_panel_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ice"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://ice:ice@localhost:5432/ice_panel_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars-long
      PUBLIC_URL: https://panel.ci.test
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate + migrate
        working-directory: apps/panel-backend
        run: |
          pnpm exec prisma generate
          pnpm exec prisma migrate deploy

      - name: Typecheck backend
        working-directory: apps/panel-backend
        run: pnpm exec tsc --noEmit

      - name: Typecheck frontend
        working-directory: apps/panel-frontend
        run: pnpm exec tsc --noEmit

      - name: Test backend
        working-directory: apps/panel-backend
        run: pnpm test

  node-agent:
    name: node-agent (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          # No go.sum yet (zero external deps) — let setup-go skip cache wiring.
          cache: false

      - name: Build
        working-directory: apps/node
        run: go build ./...

      - name: Vet
        working-directory: apps/node
        run: go vet ./...

      - name: Test
        working-directory: apps/node
        run: go test ./...
