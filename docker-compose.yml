services:
  postgres:
    image: postgres:16-alpine
    container_name: icepanel-postgres
    environment:
      POSTGRES_USER: icepanel
      POSTGRES_PASSWORD: icepanel_dev
      POSTGRES_DB: icepanel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: icepanel-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
